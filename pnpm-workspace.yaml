# Allow these dependencies to run their install/build scripts on a fresh install
# (esbuild links its native binary). strictDepBuilds:false keeps `pnpm install
# --frozen-lockfile` from exiting non-zero when an approved build is merely
# pending on a warm store. Kept here rather than in .npmrc so `npm` doesn't warn
# about an unknown config key during publish.
onlyBuiltDependencies:
  - esbuild
strictDepBuilds: false

# Exempt fallow from the minimum-release-age supply-chain policy. fallow is a
# dev-only static-analysis tool that ships fast; a just-published version would
# otherwise fail `pnpm install --frozen-lockfile` in CI until it ages past the
# window. It is never part of the published package. All other deps still honor
# the policy.
minimumReleaseAgeExclude:
  - fallow
  - '@fallow-cli/*'
