name: Preview release

# Publishes an installable preview of every commit / PR via pkg.pr.new, e.g.
#   pnpm add https://pkg.pr.new/apphane-dev/kahraman@<sha>
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Publish preview
        run: pnpm dlx pkg-pr-new publish --pnpm
