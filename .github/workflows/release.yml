name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the "Version Packages" PR and git tags
      pull-requests: write # open/update the release PR
      id-token: write # OIDC trusted publishing + provenance
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      # Tokenless publish via OIDC trusted publishing (configured on npmjs.com
      # for this repo + release.yml). npm mints a short-lived credential and
      # attaches provenance automatically — no NPM_TOKEN secret. Needs a recent
      # npm, so update it here.
      - name: Update npm (OIDC trusted publishing)
        run: npm install -g npm@latest

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Create release PR or publish to npm
        uses: changesets/action@v1
        with:
          version: pnpm changeset version
          publish: pnpm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
